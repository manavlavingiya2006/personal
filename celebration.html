<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18 Months of Us | Celebration</title>
    <link rel="stylesheet" href="style.css">

<body>
    <nav class="navbar animate-pop">
        <a href="index.html">Home</a>

        <div class="page-doodles"><span>💘</span><span>🌹</span><span>💌</span><span>🧸</span><span>✨</span></div>

        <div style="font-size: 150px; cursor: pointer; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" onclick="fireConfetti()">
